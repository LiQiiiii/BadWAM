# @package _global_

defaults:
  - train
  - override /task: libero_uncond_2cam224_1e-4
  - _self_

ckpt: null
gpu_id: 0

model:
  load_text_encoder: true
  skip_dit_load_from_pretrain: true
  action_dit_pretrained_path: null

EVALUATION:
  task_suite_name: libero_spatial
  task_id: 0
  num_trials: 50
  output_dir: ./evaluate_results/libero/${hydra:runtime.choices.task}/${now:%Y%m%d_%H%M%S}

  # Runtime behavior
  env_num: 1
  num_steps_wait: 30
  replan_steps: 10
  binarize_gripper: true
  use_action_ensembler: false
  visualize_future_video: false

  # Action inference
  action_horizon: null
  num_inference_steps: ${eval_num_inference_steps}
  sigma_shift: null
  text_cfg_scale: 1.0
  negative_prompt: ""
  rand_device: cpu
  tiled: false

  # Optional external inputs
  dataset_stats_path: null
  device: cuda

  # BadWAM: disabled by default. Enable with
  # EVALUATION.attack.enabled=true EVALUATION.attack.mode=action_only
  attack:
    enabled: false
    name: clean
    mode: action_only          # action_only / imagination_preserving / universal_patch
    objective: desynchronization
    search: query               # query / random / load
    space: patch               # patch / full_linf
    patch_mode: additive       # additive / replace
    patch_size: 32
    patch_h: null
    patch_w: null
    patch_location: bottom_right
    camera: both               # both / agentview / wrist
    epsilon: 0.06
    step_size: 0.02
    sigma: 0.02
    budget: 16
    restarts: 1
    action_weight: 1.0
    future_weight: 1.0
    perturb_weight: 0.05
    targeted: false
    target_action_scale: -1.0
    require_future: true
    seed: 0
    patch_path: null
    save_raw: true
    save_images: false
    save_patch: true
    train_input_glob: null
    train_output_path: null
    train_steps: 100
    train_batch_size: 4
    train_max_examples: null
    train_task_description: perform the task

MULTIRUN:
  create_only: false
  task_file: null
  task_suite_names:
    - libero_10
    - libero_goal
    - libero_spatial
    - libero_object
  num_gpus: 8
  max_tasks_per_gpu: 2

hydra:
  job:
    chdir: false
  run:
    dir: .
  output_subdir: null
